# ─── TenantOS Nginx Configuration ─────────────────────────────
# Production reverse proxy with rate limiting, security headers,
# SSL termination, and access logging.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":"$status",'
            '"body_bytes":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"x_tenant_id":"$http_x_tenant_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain application/json application/javascript;

    # ── Rate Limiting Zones ──────────────────────────────────
    # Global: 100 req/min per IP
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;

    # Auth endpoints: 10 req/min per IP (strict)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # API: 1000 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=1000r/m;

    # ── Upstream ─────────────────────────────────────────────
    upstream tenantOS_app {
        least_conn;
        server app:3000 max_fails=3 fail_timeout=30s;
        # Add more instances for horizontal scaling:
        # server app2:3000 max_fails=3 fail_timeout=30s;
        # server app3:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Main Server ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.tenantOS.io;

        # SSL/TLS (use Let's Encrypt / ACM cert)
        ssl_certificate     /etc/ssl/certs/tenantOS.crt;
        ssl_certificate_key /etc/ssl/private/tenantOS.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security Headers ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'" always;

        # Remove server version
        server_tokens off;

        # ── Health endpoints (no rate limit) ─────────────────
        location = /health {
            proxy_pass http://tenantOS_app;
            proxy_set_header Host $host;
            access_log off;
        }

        location = /ready {
            proxy_pass http://tenantOS_app;
            access_log off;
        }

        # ── Auth endpoints (strict rate limit) ───────────────
        location ~ ^/api/v[0-9]+/auth/(login|register|refresh) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://tenantOS_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Prevent timing attacks on auth
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }

        # ── API endpoints ─────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://tenantOS_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;

            # Buffer responses
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ── 429 custom page ──────────────────────────────────
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"ok":false,"error":"Too many requests","code":"RATE_LIMITED","retryAfter":60}';
        }
    }
}
